        <path d="M70 546c90 44 184 68 280 72 72 4 144-2 216-18 10 40 16 84 16 130H0c2-72 10-134 24-190 14-6 30-4 46 6Z" fill="#dcecf6" opacity=".62"/>
    </g>

    <g transform="translate(368 216)" filter="url(#softShadow)">
        <rect x="0" y="0" width="290" height="316" rx="48" fill="#ffffff" opacity=".92"/>
        <rect x="38" y="42" width="214" height="78" rx="30" fill="#eefaff"/>
        <circle cx="76" cy="80" r="22" fill="#68d7c1"/>
        <path d="M178 72h44m-22-22v44" stroke="#18346f" stroke-width="15" stroke-linecap="round"/>
        <path d="M98 150h92v66c0 42 50 76 62 128 20 84-46 142-108 142S16 428 38 344c12-52 60-86 60-128v-66Z" fill="url(#glass)" stroke="#47618f" stroke-width="12" stroke-linejoin="round"/>
        <path d="M64 340c36-20 83 12 132-8 22 62-18 108-72 108-49 0-75-38-60-100Z" fill="url(#liquid)" opacity=".82"/>
        <path d="M112 148h64" stroke="#47618f" stroke-width="15" stroke-linecap="round"/>
        <circle cx="218" cy="198" r="20" fill="#ffbf12"/>
    </g>

    <g transform="translate(918 408)" filter="url(#cardShadow)">
