        <rect x="0" y="0" width="1020" height="88" rx="44" fill="#ffffff" opacity=".5"/>
        <rect x="38" y="23" width="162" height="42" rx="21" fill="#0f2c67" opacity=".95"/>
        <rect x="226" y="23" width="162" height="42" rx="21" fill="#ffbf12" opacity=".9"/>
        <rect x="414" y="23" width="162" height="42" rx="21" fill="#2fc1d4" opacity=".72"/>
        <rect x="602" y="23" width="162" height="42" rx="21" fill="#ffffff" opacity=".88"/>
        <rect x="790" y="23" width="162" height="42" rx="21" fill="#0f2c67" opacity=".72"/>
