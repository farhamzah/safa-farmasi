<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
    <title id="title">Visual laboratorium farmasi</title>
    <desc id="desc">Visual premium tenaga farmasi di laboratorium dengan glassware, rak obat, dan aksen biru emas.</desc>
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#f9fdff"/>
            <stop offset=".48" stop-color="#e8f7ff"/>
            <stop offset="1" stop-color="#c7ebff"/>
        </linearGradient>
        <linearGradient id="navy" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#18346f"/>
            <stop offset="1" stop-color="#071a3d"/>
        </linearGradient>
        <linearGradient id="coat" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset=".75" stop-color="#edf7fc"/>
            <stop offset="1" stop-color="#dbeaf5"/>
        </linearGradient>
        <linearGradient id="glass" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#f8fdff" stop-opacity=".92"/>
            <stop offset=".55" stop-color="#d5f5ff" stop-opacity=".7"/>
            <stop offset="1" stop-color="#6bd6e9" stop-opacity=".82"/>
        </linearGradient>
        <linearGradient id="liquid" x1="0" x2="1">
            <stop offset="0" stop-color="#4fcbd6"/>
            <stop offset="1" stop-color="#11a8c8"/>
        </linearGradient>
        <linearGradient id="amber" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#ffd86b"/>
            <stop offset=".58" stop-color="#ffbf12"/>
            <stop offset="1" stop-color="#f2a900"/>
        </linearGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#09204d" flood-opacity=".18"/>
        </filter>
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#082457" flood-opacity=".14"/>
        </filter>
        <filter id="blurPanel">
            <feGaussianBlur stdDeviation="8"/>
        </filter>
    </defs>

    <rect width="1400" height="900" fill="url(#bg)"/>
    <path d="M775 0h625v900H695c60-116 73-247 40-393-38-170-24-341 40-507Z" fill="#dff5ff" opacity=".84"/>
    <circle cx="1138" cy="176" r="86" fill="url(#amber)" opacity=".92"/>
    <circle cx="1150" cy="176" r="112" fill="#ffbf12" opacity=".18" filter="url(#blurPanel)"/>
    <circle cx="166" cy="120" r="172" fill="#fff" opacity=".48"/>
    <circle cx="1210" cy="822" r="366" fill="#0d2b66" opacity=".96"/>
    <circle cx="1045" cy="750" r="246" fill="#ffffff" opacity=".1" stroke="#ffffff" stroke-opacity=".18" stroke-width="2"/>

    <g opacity=".48">
        <rect x="84" y="96" width="538" height="86" rx="24" fill="#ffffff"/>
        <rect x="124" y="126" width="90" height="16" rx="8" fill="#8bd5ed"/>
        <rect x="242" y="126" width="240" height="16" rx="8" fill="#c6e9f5"/>
        <rect x="514" y="126" width="54" height="16" rx="8" fill="#f7c642"/>
        <rect x="84" y="218" width="474" height="78" rx="24" fill="#ffffff"/>
